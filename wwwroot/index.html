<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tibber Victron Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #111; color: #f3f3f3; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #1b1b1b; border-radius: 14px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.25); }
    .value { font-size: 1.6rem; font-weight: bold; margin-top: 8px; }
    .legend { display: flex; gap: 16px; margin: 16px 0; flex-wrap: wrap; }
    .legend span { display: inline-flex; align-items: center; gap: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 28px; }
    .panel { background: #1b1b1b; border-radius: 14px; padding: 16px; }
    .table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .table th, .table td { padding: 10px; border-bottom: 1px solid #333; text-align: left; vertical-align: top; }
    canvas { background: #181818; border-radius: 10px; padding: 8px; }
  </style>
</head>
<body>
  <h1>Tibber Victron Dashboard – Forecast mit SoC-Simulation</h1>

  <div class="cards">
    <div class="card"><div>SoC</div><div class="value" id="soc">-</div></div>
    <div class="card"><div>Netzleistung</div><div class="value" id="grid">-</div></div>
    <div class="card"><div>PV</div><div class="value" id="pv">-</div></div>
    <div class="card"><div>Hausverbrauch</div><div class="value" id="house">-</div></div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Tibber Preise und Forecast-Aktion</h2>
      <div class="legend">
        <span><i class="dot" style="background:#2ecc71"></i>Lädt</span>
        <span><i class="dot" style="background:#e74c3c"></i>Entlädt</span>
        <span><i class="dot" style="background:#95a5a6"></i>Warten</span>
        <span><i class="dot" style="background:#4fc3f7"></i>Forecast SoC</span>
      </div>
      <canvas id="priceChart" height="120"></canvas>
    </div>

    <div class="panel">
      <h2>Verbrauchsverlauf letzte 24h</h2>
      <canvas id="consumptionChart" height="120"></canvas>
    </div>

    <div class="panel">
      <h2>Letzte Entscheidungen</h2>
      <table class="table" id="decisionTable">
        <thead>
          <tr><th>Zeit</th><th>Aktion</th><th>Preis</th><th>Begründung</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    let priceChart;
    let consumptionChart;

    const nowLinePlugin = {
      id: 'nowLinePlugin',
      afterDatasetsDraw(chart) {
        const { ctx, chartArea, scales } = chart;
        const xScale = scales.x;
        if (!chartArea || !xScale) return;

        const tibberPrices = chart.options.plugins.nowLinePluginData?.tibberPrices ?? [];
        if (!tibberPrices.length) return;

        const now = new Date();
        const points = tibberPrices.map((p, i) => ({ index: i, time: new Date(p.startsAt) }));

        let targetIndex = -1;
        for (let i = 0; i < points.length; i++) {
          const start = points[i].time;
          const end = i < points.length - 1 ? points[i + 1].time : new Date(start.getTime() + 60 * 60 * 1000);
          if (now >= start && now < end) {
            targetIndex = i;
            break;
          }
        }

        if (targetIndex === -1) return;

        const x = xScale.getPixelForValue(targetIndex);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffffff';
        ctx.setLineDash([6, 6]);
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = '12px Arial';
        ctx.fillText('Jetzt', x + 6, chartArea.top + 14);
        ctx.restore();
      }
    };

    function actionColor(action) {
      switch ((action || '').toLowerCase()) {
        case 'charge': return '#2ecc71';
        case 'discharge': return '#e74c3c';
        default: return '#95a5a6';
      }
    }

    function actionLabel(action) {
      switch ((action || '').toLowerCase()) {
        case 'charge': return 'Lädt';
        case 'discharge': return 'Entlädt';
        default: return 'Warten';
      }
    }

    function formatDate(value) {
      return new Date(value).toLocaleString('de-DE', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    async function loadDashboard() {
      const response = await fetch('/api/dashboard');
      const data = await response.json();

      document.getElementById('soc').textContent = `${data.currentState.batterySocPercent.toFixed(1)} %`;
      document.getElementById('grid').textContent = `${data.currentState.gridPowerWatts.toFixed(0)} W`;
      document.getElementById('pv').textContent = `${data.currentState.pvPowerWatts.toFixed(0)} W`;
      document.getElementById('house').textContent = `${data.currentState.houseConsumptionWatts.toFixed(0)} W`;

      const labels = data.tibberPrices.map(x => new Date(x.startsAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
      const prices = data.tibberPrices.map(x => Number(x.price));
      const pointColors = data.tibberPrices.map(x => actionColor(x.action));
      const forecastSoc = data.tibberPrices.map(x => Number(x.forecastSocPercent));

      const avgPrice = prices.length ? prices.reduce((sum, value) => sum + value, 0) / prices.length : 0;
      const avgLine = prices.map(() => avgPrice);

      if (priceChart) {
        priceChart.destroy();
      }

      priceChart = new Chart(document.getElementById('priceChart'), {
        plugins: [nowLinePlugin],
        data: {
          labels,
          datasets: [
            {
              type: 'bar',
              label: 'Preis €/kWh',
              data: prices,
              backgroundColor: pointColors,
              borderColor: pointColors,
              borderWidth: 1,
              yAxisID: 'y'
            },
            {
              type: 'line',
              label: 'Durchschnitt €/kWh',
              data: avgLine,
              borderColor: '#f1c40f',
              backgroundColor: '#f1c40f',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0,
              fill: false,
              yAxisID: 'y'
            },
            {
              type: 'line',
              label: 'Forecast SoC %',
              data: forecastSoc,
              borderColor: '#4fc3f7',
              backgroundColor: '#4fc3f7',
              borderWidth: 2,
              pointRadius: 2,
              tension: 0.2,
              fill: false,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            nowLinePluginData: {
              tibberPrices: data.tibberPrices
            },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  if (ctx.dataset.label === 'Forecast SoC %') {
                    return `Forecast SoC: ${Number(ctx.raw).toFixed(1)} %`;
                  }
                  if (ctx.dataset.type === 'line' && ctx.dataset.label === 'Durchschnitt €/kWh') {
                    return `Durchschnitt: ${Number(ctx.raw).toFixed(3)} €/kWh`;
                  }
                  const point = data.tibberPrices[ctx.dataIndex];
                  return `Preis: ${Number(point.price).toFixed(3)} €/kWh | ${actionLabel(point.action)} | SoC: ${Number(point.forecastSocPercent).toFixed(1)} %`;
                }
              }
            }
          },
          scales: {
            y: {
              type: 'linear',
              position: 'left',
              beginAtZero: true
            },
            y1: {
              type: 'linear',
              position: 'right',
              min: 0,
              max: 100,
              grid: {
                drawOnChartArea: false
              }
            }
          }
        }
      });

      const consumptionLabels = data.stateHistory.map(x =>
        new Date(x.timestampUtc).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
      );
      const consumptionValues = data.stateHistory.map(x => Number(x.houseConsumptionWatts));
      const gridValues = data.stateHistory.map(x => Number(x.gridPowerWatts));

      if (consumptionChart) {
        consumptionChart.destroy();
      }

      consumptionChart = new Chart(document.getElementById('consumptionChart'), {
        type: 'line',
        data: {
          labels: consumptionLabels,
          datasets: [
            {
              label: 'Hausverbrauch W',
              data: consumptionValues,
              borderColor: '#3498db',
              backgroundColor: '#3498db',
              pointRadius: 0,
              tension: 0.2
            },
            {
              label: 'Netzleistung W',
              data: gridValues,
              borderColor: '#9b59b6',
              backgroundColor: '#9b59b6',
              pointRadius: 0,
              tension: 0.2
            }
          ]
        },
        options: {
          responsive: true
        }
      });

      const tbody = document.querySelector('#decisionTable tbody');
      tbody.innerHTML = '';
      for (const row of data.decisions) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${formatDate(row.timestampUtc)}</td>
          <td>${actionLabel(row.action)}</td>
          <td>${Number(row.currentPrice).toFixed(3)} €/kWh</td>
          <td>${row.reason}</td>`;
        tbody.appendChild(tr);
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 10000);
    setInterval(() => {
      if (priceChart) priceChart.draw();
    }, 10000);
  </script>
</body>
</html>
